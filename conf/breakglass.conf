# Break-glass OTP — Issabel Security Fix
# OTP obrigatório para qualquer IP fora da whitelist EXPLÍCITA do Issabel
# (iptables.db). Não trata RFC1918 como confiável automaticamente.
#
# Após OTP válido: cria sessão + adiciona o IP na whitelist por TTL_HOURS.

ENABLED=1
TTL_HOURS=10

# 1 = também libera o IP no Apache (/admin, configs) via whitelist temporária
# 0 = só sessão Issabel (index.php); /admin continua bloqueado sem IP na lista
TEMP_WHITELIST=1

# Prefixo da nota no sqlite (usado pelo cron de expiração)
NOTE_PREFIX=isf-breakglass
