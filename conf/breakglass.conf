# Break-glass OTP — Issabel Security Fix
#
# PADRÃO: ENABLED=0 → Apache bloqueia tudo por whitelist (máxima contenção).
# OPCIONAL: ENABLED=1 → index.php liberado para login+OTP fora da whitelist
#            explícita; /admin e demais entrypoints CONTINUAM bloqueados por IP.
#
# Ative na instalação:
#   ./issabel-security-fix.sh --harden --apply --enable-breakglass
# ou edite este arquivo e rode --harden --apply.

ENABLED=0
TTL_HOURS=10

# 1 = após OTP, adiciona IP na whitelist Apache por TTL_HOURS
# 0 = só sessão Issabel (index.php); /admin permanece bloqueado
TEMP_WHITELIST=1

NOTE_PREFIX=isf-breakglass
