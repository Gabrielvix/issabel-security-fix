# Bloqueio web por IP (Apache) — Issabel Security Fix
#
# PADRÃO: ENABLED=1 → index.php /admin /configs só para IPs da whitelist.
# DESLIGADO: ENABLED=0 → interface web aberta na internet (menos seguro).
#
# Comandos:
#   ./issabel-security-fix.sh --disable-web-lock
#   ./issabel-security-fix.sh --enable-web-lock
#
# Demais proteções (PHP em uploads, C2 block, fail2ban, malware fix) continuam ativas.

ENABLED=1
