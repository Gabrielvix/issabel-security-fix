# Tempo / NTP — Issabel Security Fix
# TOTP (OTP) quebra se o relógio do servidor estiver errado.

# Fuso horário opcional (vazio = mantém o atual). Exemplos:
# TIMEZONE=America/Sao_Paulo
# TIMEZONE=UTC
TIMEZONE=

# 1 = garante chronyd instalado, habilitado e com fontes usáveis
ENSURE_CHRONY=1

# 1 = permite salto grande de relógio na sincronização (necessário se a hora estiver muito errada)
FORCE_STEP=1

# Fontes NTP de fallback (vírgula). Usadas se chrony não sincronizar ou não tiver pool público.
# Não remove servers já configurados (ex.: NTP interno); só acrescenta.
NTP_POOLS=a.st1.ntp.br,b.st1.ntp.br,c.st1.ntp.br,pool.ntp.org
